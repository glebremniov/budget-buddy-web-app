<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Smart finance tracker for everyday budgeting. Track income, expenses, and categories with Budget Buddy." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Budget Buddy" />
    <meta name="theme-color" content="#2563eb" />
    <!-- manifest.webmanifest is injected by vite-plugin-pwa -->
    <title>Budget Buddy</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('budget-buddy-theme');
          if (stored) {
            var s = JSON.parse(stored).state;
            var theme = s.theme || 'system';
            var isDark =
              theme === 'dark' ||
              (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
            if (s.primaryHue !== undefined)
              document.documentElement.style.setProperty('--primary-hue', s.primaryHue);
            if (s.fontSize !== undefined)
              document.documentElement.style.setProperty('--font-size-base', s.fontSize + 'px');
          }
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        --primary-hue: 240;
        color-scheme: light dark;
        
        --background: light-dark(#ffffff, #09090b);
        --foreground: light-dark(#09090b, #fafafa);
        --primary: light-dark(hsl(var(--primary-hue) 70% 45%), hsl(var(--primary-hue) 70% 70%));
      }
      body {
        background-color: var(--background);
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        height: 100dvh;
        gap: 1.5rem;
        animation: fade-in 0.6s ease-out;
      }
      .spinner {
        position: relative;
        width: 48px;
        height: 48px;
      }
      .spinner:before,
      .spinner:after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 4.5px solid transparent;
      }
      .spinner:before {
        border-top-color: var(--primary);
        animation: rotate 0.8s cubic-bezier(0.55, 0.1, 0.15, 0.9) infinite;
        z-index: 10;
      }
      .spinner:after {
        border: 4.5px solid var(--primary);
        opacity: 0.15;
      }
      .brand-name {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--foreground);
        letter-spacing: -0.025em;
        opacity: 0.9;
      }
      @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-container">
        <div class="spinner"></div>
        <div class="brand-name">Budget Buddy</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
