server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ──────────────────────────────────────────────────────────
    # Fall back to index.html for any path that does not resolve to a real file
    # so that TanStack Router handles client-side navigation on page refresh or
    # deep-link access.
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    # ── Service worker + runtime config — never cache ─────────────────────────
    # The SW file must always be fetched fresh so the browser detects updates.
    # config.json and version.json are runtime-injected and must not be stale.
    location ~* ^/(sw\.js|workbox-.*\.js|config\.json|version\.json)$ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # ── Cache-Control for hashed assets ──────────────────────────────────────
    # Vite appends a content hash to every JS/CSS/font filename (e.g.
    # main-D4bF3kLm.js). When the content changes the hash changes and the
    # browser fetches a fresh copy; until then it can safely serve the cached
    # version indefinitely.
    #
    # Security headers are included explicitly because nginx does not merge
    # add_header directives from parent blocks into child location blocks that
    # define their own add_header.
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images and other media get a shorter TTL because they may not be hashed.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;
}
