<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Silent renew</title>
  </head>
  <body>
    <!--
      Minimal page loaded by oidc-client-ts inside a hidden iframe during
      background token renewal (automaticSilentRenew).

      After the OIDC provider redirects back here, this script posts the
      full URL (containing the new tokens or authorization code) to the
      parent frame. oidc-client-ts listens for this message and resolves
      the silent-renew promise without loading the full React bundle.
    -->
    <script>
      window.parent.postMessage(
        { source: 'oidc-client', url: window.location.href },
        window.location.origin,
      );
    </script>
  </body>
</html>
